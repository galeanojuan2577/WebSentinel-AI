<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VulnScout</title>
<style>
:root {
  --bg-primary: #0f172a;
  --bg-secondary: #1e293b;
  --bg-card: #1e293b;
  --bg-input: #0f172a;
  --border: #334155;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --critical: #ef4444;
  --high: #f97316;
  --medium: #eab308;
  --low: #3b82f6;
  --info: #6b7280;
  --success: #22c55e;
  --radius: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
  line-height: 1.5;
  min-height: 100vh;
}
.app { max-width: 1100px; margin: 0 auto; padding: 20px; }

/* Header */
.header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
  padding: 16px 20px; background: var(--bg-secondary); border-radius: var(--radius);
  border: 1px solid var(--border);
}
.header-icon {
  width: 36px; height: 36px; background: var(--accent); border-radius: 8px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.header h1 { font-size: 20px; font-weight: 700; }
.header .subtitle { font-size: 13px; color: var(--text-secondary); }

/* Scan Input */
.scan-box {
  background: var(--bg-secondary); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 20px; margin-bottom: 20px;
}
.scan-box h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: var(--text-primary); }
.scan-row { display: flex; gap: 8px; }
.scan-row input {
  flex: 1; padding: 10px 14px; background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-primary); font-size: 14px; outline: none;
  transition: border-color .2s;
}
.scan-row input:focus { border-color: var(--accent); }
.scan-row input::placeholder { color: var(--text-muted); }
.btn {
  padding: 10px 24px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all .2s; white-space: nowrap;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-secondary { background: var(--border); color: var(--text-primary); }
.btn-secondary:hover { background: #475569; }

/* Cards */
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
.card {
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
}
.card-label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin-bottom: 4px; }
.card-value { font-size: 22px; font-weight: 700; }

/* Summary badges */
.badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
.badge {
  padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
}
.badge-critical { background: rgba(239,68,68,0.15); color: var(--critical); border: 1px solid rgba(239,68,68,0.3); }
.badge-high { background: rgba(249,115,22,0.15); color: var(--high); border: 1px solid rgba(249,115,22,0.3); }
.badge-medium { background: rgba(234,179,8,0.15); color: var(--medium); border: 1px solid rgba(234,179,8,0.3); }
.badge-low { background: rgba(59,130,246,0.15); color: var(--low); border: 1px solid rgba(59,130,246,0.3); }
.badge-info { background: rgba(107,114,128,0.15); color: var(--info); border: 1px solid rgba(107,114,128,0.3); }

/* Findings */
.findings { margin-top: 8px; }
.finding {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
}
.finding-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; cursor: pointer; transition: background .2s;
  border-left: 4px solid var(--border);
}
.finding-header:hover { background: rgba(255,255,255,0.03); }
.finding-crit .finding-header { border-left-color: var(--critical); }
.finding-high .finding-header { border-left-color: var(--high); }
.finding-medium .finding-header { border-left-color: var(--medium); }
.finding-low .finding-header { border-left-color: var(--low); }
.finding-info .finding-header { border-left-color: var(--info); }
.finding-name { font-size: 14px; font-weight: 600; }
.finding-severity {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  padding: 2px 8px; border-radius: 10px; letter-spacing: .05em;
}
.finding-body { padding: 0 16px 12px; font-size: 13px; color: var(--text-secondary); display: none; }
.finding.open .finding-body { display: block; }
.finding-body p { margin-bottom: 6px; }
.finding-body code {
  background: rgba(0,0,0,0.3); padding: 1px 5px; border-radius: 3px;
  font-size: 12px; color: var(--text-primary);
}
.remediation-box {
  background: rgba(234,179,8,0.08); border: 1px solid rgba(234,179,8,0.2);
  border-radius: 6px; padding: 10px 14px; margin: 8px 0;
}
.remediation-box pre {
  white-space: pre-wrap; font-family: inherit; font-size: 13px;
  margin-top: 4px; color: var(--text-primary);
}
.evidence-box {
  background: rgba(0,0,0,0.3); border-radius: 6px; padding: 10px 14px; margin: 8px 0;
}
.evidence-box pre {
  white-space: pre-wrap; font-family: 'Fira Code', 'Cascadia Code', monospace;
  font-size: 12px; color: #e5e7eb; margin-top: 4px;
}
.refs { margin-top: 6px; font-size: 12px; }
.refs a { color: var(--accent); text-decoration: none; }
.refs a:hover { text-decoration: underline; }

/* States */
.empty-state, .loading-state, .error-state {
  text-align: center; padding: 60px 20px; color: var(--text-muted);
}
.empty-state svg, .loading-state svg { opacity: .4; margin-bottom: 12px; }
.loading-state .spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%; margin: 0 auto 12px;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.footer {
  text-align: center; padding: 16px; color: var(--text-muted);
  font-size: 12px; border-top: 1px solid var(--border); margin-top: 32px;
}

.error-state p { color: var(--critical); }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <div class="header-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
    <div>
      <h1>VulnScout</h1>
      <div class="subtitle">Web Vulnerability Scanner</div>
    </div>
  </div>

  <div class="scan-box">
    <h2>Target</h2>
    <div class="scan-row">
      <input type="text" id="urlInput" placeholder="https://ejemplo.com" autofocus>
      <button class="btn btn-primary" id="scanBtn" onclick="startScan()">Scan</button>
    </div>
    <div id="errorMsg" style="margin-top:8px;font-size:13px;color:var(--critical);display:none"></div>
  </div>

  <div id="statusBar" style="display:none;margin-bottom:16px;padding:10px 14px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--text-secondary)">
    <span id="statusText">Initializing...</span>
  </div>

  <div id="resultsArea"></div>

  <div id="emptyState" class="empty-state">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    <p>Enter a URL above to start scanning</p>
  </div>

  <div class="footer">VulnScout v0.1.0 — Professional Web Vulnerability Scanner</div>
</div>

<script>
const API = '';
let scanId = null;
let ws = null;

function $(id) { return document.getElementById(id); }

function showError(msg) {
  const el = $('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}

function setStatus(text, isScanning) {
  const bar = $('statusBar');
  const txt = $('statusText');
  bar.style.display = 'block';
  txt.textContent = text;
  $('scanBtn').disabled = isScanning;
  $('scanBtn').textContent = isScanning ? 'Scanning...' : 'Scan';
}

async function startScan() {
  const url = $('urlInput').value.trim();
  if (!url) { showError('Enter a target URL'); return; }
  const finalUrl = url.startsWith('http') ? url : 'https://' + url;

  $('errorMsg').style.display = 'none';
  $('resultsArea').innerHTML = '';
  $('emptyState').style.display = 'none';
  setStatus('Scanning ' + finalUrl + '...', true);

  // Show loading
  $('resultsArea').innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Running vulnerability checks...</p></div>';

  try {
    const resp = await fetch(API + '/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: finalUrl, checks: ['all'] })
    });
    const data = await resp.json();
    scanId = data.scan_id;
    connectWs(scanId);
  } catch(e) {
    $('resultsArea').innerHTML = '<div class="error-state"><p>Failed to start scan: ' + e.message + '</p></div>';
    setStatus('Failed', false);
  }
}

function connectWs(id) {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = protocol + '//' + location.host + '/ws';
  ws = new WebSocket(wsUrl);
  ws.onopen = () => {};
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'scan_completed' && msg.scan_id === id) {
        renderResults(msg.result);
        setStatus('Completed — ' + msg.result.vulnerabilities.length + ' findings', false);
      } else if (msg.type === 'scan_failed' && msg.scan_id === id) {
        $('resultsArea').innerHTML = '<div class="error-state"><p>Scan failed: ' + (msg.error || 'Unknown error') + '</p></div>';
        setStatus('Failed', false);
      }
    } catch(_) {}
  };
  ws.onerror = () => {
    // Fallback: poll for results
    pollResult(id);
  };
}

async function pollResult(id) {
  for (let i = 0; i < 120; i++) {
    await new Promise(r => setTimeout(r, 2000));
    try {
      const resp = await fetch(API + '/scan/' + id);
      if (resp.ok) {
        const data = await resp.json();
        if (data.status === 'completed' || data.vulnerabilities) {
          renderResults(data);
          setStatus('Completed — ' + data.vulnerabilities.length + ' findings', false);
          return;
        }
      }
    } catch(_) {}
  }
  $('resultsArea').innerHTML = '<div class="error-state"><p>Scan timed out</p></div>';
  setStatus('Timed out', false);
}

function severityColor(s) {
  const map = { critical:'var(--critical)', high:'var(--high)', medium:'var(--medium)', low:'var(--low)', info:'var(--info)' };
  return map[s] || 'var(--info)';
}

function severityClass(s) {
  return 'finding-' + (s || 'info');
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function renderResults(result) {
  const vulns = result.vulnerabilities || [];
  const summary = result.summary || {};
  const totalVulns = Object.values(summary).reduce((a,b) => a + b, 0);

  let html = '';

  // Cards
  html += '<div class="cards">';
  html += '<div class="card"><div class="card-label">Target</div><div class="card-value" style="font-size:14px;word-break:break-all">' + escapeHtml(result.target?.url || '') + '</div></div>';
  html += '<div class="card"><div class="card-label">Duration</div><div class="card-value">' + (result.duration_seconds ? result.duration_seconds.toFixed(1) + 's' : '—') + '</div></div>';
  html += '<div class="card"><div class="card-label">Findings</div><div class="card-value" style="color:' + (totalVulns > 0 ? 'var(--critical)' : 'var(--success)') + '">' + totalVulns + '</div></div>';
  html += '</div>';

  // Summary badges
  if (totalVulns > 0) {
    html += '<div class="badges">';
    const order = ['critical','high','medium','low','info'];
    const labels = { critical:'CRITICAL', high:'HIGH', medium:'MEDIUM', low:'LOW', info:'INFO' };
    for (const s of order) {
      if ((summary[s] || 0) > 0) {
        html += '<span class="badge badge-' + s + '">' + labels[s] + ' ' + summary[s] + '</span>';
      }
    }
    html += '</div>';
  }

  // Findings
  if (vulns.length > 0) {
    html += '<div class="findings"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text-secondary)">Findings</h3>';
    for (let i = 0; i < vulns.length; i++) {
      const v = vulns[i];
      const sevClass = severityClass(v.severity);
      const color = severityColor(v.severity);
      const label = (v.severity || 'info').toUpperCase();

      html += '<div class="finding ' + sevClass + '" onclick="this.classList.toggle(\'open\')">';
      html += '<div class="finding-header">';
      html += '<span class="finding-name">' + escapeHtml(v.name) + '</span>';
      html += '<span class="finding-severity" style="background:' + color + '20;color:' + color + '">' + label + '</span>';
      html += '</div>';
      html += '<div class="finding-body">';
      html += '<p><strong>URL:</strong> <code>' + escapeHtml(v.url) + '</code></p>';
      html += '<p>' + escapeHtml(v.description) + '</p>';

      if (v.remediation) {
        html += '<div class="remediation-box"><strong style="color:var(--medium)">Remediation</strong><pre>' + escapeHtml(v.remediation) + '</pre></div>';
      }

      if (v.evidence) {
        html += '<div class="evidence-box"><strong style="color:var(--text-secondary)">Evidence</strong><pre>' + escapeHtml(v.evidence) + '</pre></div>';
      }

      if (v.references && v.references.length > 0) {
        html += '<div class="refs"><strong>References:</strong><br>';
        for (const ref of v.references) {
          html += '<a href="' + escapeHtml(ref) + '" target="_blank" rel="noopener">' + escapeHtml(ref) + '</a><br>';
        }
        html += '</div>';
      }

      html += '</div></div>';
    }
    html += '</div>';
  } else {
    html += '<div class="empty-state" style="padding:40px"><p style="font-size:18px;font-weight:600;color:var(--success)">No vulnerabilities found</p><p>The target appears to be well-secured.</p></div>';
  }

  $('resultsArea').innerHTML = html;
}

// Enter key triggers scan
$('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') startScan(); });
</script>
</body>
</html>
